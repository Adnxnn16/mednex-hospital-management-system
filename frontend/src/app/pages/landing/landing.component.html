<div class="min-h-screen bg-[#020617] flex flex-col items-center justify-center p-6" @fadeIn>
    <!-- Header Logo -->
    <div class="mb-10 flex flex-col items-center">
        <div class="mb-4 relative">
             <!-- Medical Bag Icon with Glow -->
            <div class="size-16 bg-sky-500 rounded-2xl flex items-center justify-center shadow-[0_0_30px_rgba(14,165,233,0.4)]">
                <span class="material-symbols-outlined text-white text-4xl leading-none">medical_services</span>
            </div>
            <!-- Pulse Animation -->
            <div class="absolute inset-0 size-16 bg-sky-500 rounded-2xl animate-ping opacity-20"></div>
        </div>
        <div class="text-center">
            <h1 class="text-4xl font-bold text-white tracking-tight flex items-center gap-2">
                MedNex
            </h1>
            <p class="text-[11px] font-bold text-sky-500 uppercase tracking-[0.3em] mt-1">Enterprise Systems</p>
        </div>
    </div>

    <!-- Portal Access Card -->
    <div class="w-full max-w-[480px] bg-[#0f172a] border border-white/[0.05] rounded-[2rem] p-10 shadow-2xl">
        <div class="text-center mb-10">
            <h2 class="text-2xl font-bold text-white mb-2">Portal Access</h2>
            <p class="text-slate-400 text-sm">Select your role and enter credentials</p>
        </div>

        <!-- Role Selector Tabs -->
        <div class="bg-[#1e293b]/50 p-1.5 rounded-2xl flex gap-1 mb-10">
            <button 
                *ngFor="let r of roles" 
                (click)="activeRole = r.key"
                [class.bg-sky-500]="activeRole === r.key"
                [class.text-white]="activeRole === r.key"
                [class.text-slate-400]="activeRole !== r.key"
                class="flex-1 py-3 rounded-xl text-sm font-bold transition-all duration-300">
                {{ r.title }}
            </button>
        </div>

        <!-- Credentials Form -->
        <div class="space-y-6">
            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Email Address</label>
                <div class="relative group">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl group-focus-within:text-sky-500 transition-colors">alternate_email</span>
                    <input 
                        type="email" 
                        placeholder="name@mednex.com" 
                        class="w-full bg-[#1e293b]/40 border border-white/[0.05] rounded-2xl pl-12 pr-4 py-4 text-white focus:border-sky-500/50 focus:ring-1 focus:ring-sky-500/50 outline-none transition-all placeholder:text-slate-600">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Password</label>
                <div class="relative group">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl group-focus-within:text-sky-500 transition-colors">lock</span>
                    <input 
                        [type]="showPassword ? 'text' : 'password'" 
                        placeholder="••••••••" 
                        class="w-full bg-[#1e293b]/40 border border-white/[0.05] rounded-2xl pl-12 pr-12 py-4 text-white focus:border-sky-500/50 focus:ring-1 focus:ring-sky-500/50 outline-none transition-all placeholder:text-slate-600">
                    <button 
                        (click)="showPassword = !showPassword"
                        class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white transition-colors">
                        <span class="material-symbols-outlined text-xl">{{ showPassword ? 'visibility_off' : 'visibility' }}</span>
                    </button>
                </div>
            </div>

            <div class="flex items-center justify-between pt-2">
                <label class="flex items-center gap-3 cursor-pointer group">
                    <div class="size-5 border-2 border-slate-700 rounded-md flex items-center justify-center group-hover:border-sky-500/50 transition-colors">
                         <!-- Hidden actual checkbox -->
                         <input type="checkbox" class="hidden">
                         <div class="size-3 bg-sky-500 rounded-sm opacity-0 transition-opacity"></div>
                    </div>
                    <span class="text-sm text-slate-400 font-medium">Remember session</span>
                </label>
                <a href="#" class="text-sm text-sky-500 font-bold hover:text-sky-400 transition-colors">Forgot password?</a>
            </div>

            <div class="pt-6">
                <button 
                    (click)="login(activeRole)"
                    class="w-full bg-sky-500 hover:bg-sky-400 text-white font-bold py-4 rounded-2xl transition-all shadow-[0_10px_30px_rgba(14,165,233,0.3)] flex items-center justify-center gap-3 active:scale-[0.98]">
                    <span>Authenticate</span>
                    <span class="material-symbols-outlined text-xl">login</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Footer Copyright -->
    <div class="mt-10 text-[10px] text-slate-600 font-bold uppercase tracking-[0.2em]">
        © 2024 MedNex Enterprise Security Unit
    </div>
</div>

<!-- Background Glows -->
<div class="fixed top-[-10%] left-[-10%] size-[500px] bg-sky-500/10 rounded-full blur-[120px] -z-10 pointer-events-none"></div>
<div class="fixed bottom-[-10%] right-[-10%] size-[500px] bg-indigo-500/10 rounded-full blur-[120px] -z-10 pointer-events-none"></div>
