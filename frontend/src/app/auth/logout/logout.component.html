<div class="logout-wrapper">
  <!-- Interactive Branding -->
  <div class="branding-side">
    <div class="branding-content">
      <div class="logo-section animate-up">
        <div class="logo-circle">
          <span class="material-symbols-outlined">medical_services</span>
        </div>
        <div class="logo-text">
          <h1>MedNex</h1>
          <p>QUANTUM HEALTH SYSTEMS</p>
        </div>
      </div>
    </div>
    
    <!-- Abstract Background Elements -->
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="grid-overlay"></div>
  </div>

  <div class="form-side">
    <div class="login-card animate-up" style="animation-delay: 0.2s">
      <div class="card-header" style="text-align: center;">
        <div class="success-icon animate-up" style="animation-delay: 0.3s">
          <span class="material-symbols-outlined">verified_user</span>
        </div>
        <h2>Secure Logout Complete</h2>
        
        <div class="logout-message animate-up" style="animation-delay: 0.4s">
          <p class="highlight-text">You've been securely logged out of MedNex Enterprise.</p>
          <p class="sub-text">For your security, please close your browser tab.</p>
        </div>
        
        <a routerLink="/login" class="login-btn return-btn animate-up" style="animation-delay: 0.5s">
          <span class="material-symbols-outlined">arrow_back</span>
          Back to Login
        </a>
      </div>
      
      <div class="card-footer">
        <span class="material-symbols-outlined">shield</span>
        Session Data Cleared
      </div>
    </div>
  </div>
</div>
